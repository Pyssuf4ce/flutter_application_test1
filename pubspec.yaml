name: flutter_application_test1
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  # google_fonts: ^8.0.2  # Changed to local fonts
  supabase_flutter: ^2.5.0
  image_picker: ^1.1.2
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  intl: ^0.20.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon_v.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700
        - asset: assets/fonts/Manrope-Medium.ttf
          weight: 500
        - asset: assets/fonts/Manrope-Light.ttf
          weight: 300

    - family: Prompt
      fonts:
        - asset: assets/fonts/Prompt-Regular.ttf
        - asset: assets/fonts/Prompt-Bold.ttf
          weight: 700
        - asset: assets/fonts/Prompt-Medium.ttf
          weight: 500

    - family: Noto Sans Thai
      fonts:
        - asset: assets/fonts/NotoSansThai_SemiCondensed-Regular.ttf
        - asset: assets/fonts/NotoSansThai-Bold.ttf
          weight: 700
